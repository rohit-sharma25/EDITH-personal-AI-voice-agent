<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.D.I.T.H. Core</title>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: transparent; }
    </style>
</head>
<body>
    <canvas id="orbCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('orbCanvas');
        const ctx = canvas.getContext('2d');
        const width = 400, height = 400;
        const centerX = 200, centerY = 200;

        let edithState = "idle", targetState = "idle";
        let transitionProgress = 1;
        const transitionDuration = 40;

        const numParticles = 300;
        const baseRadius = 120;
        let particles = [];

        const JARVIS_CYAN = { r: 0, g: 210, b: 255 };
        const DEEP_BLUE = { r: 0, g: 160, b: 200 };
        const ACCENT_CYAN = { r: 0, g: 210, b: 255 };

        const states = {
            idle: { amp: 4, rot: 0.008, color: JARVIS_CYAN, drift: 0, glow: 0 },
            listening: { amp: 10, rot: 0.015, color: JARVIS_CYAN, drift: 0, glow: 0 },
            speaking: { amp: 20, rot: 0.025, color: JARVIS_CYAN, drift: 0, glow: 1 },
            thinking: { amp: 6, rot: 0.005, color: JARVIS_CYAN, drift: 1, glow: 0 }
        };

        let currentConfig = { ...states.idle };

        const phi = Math.PI * (3 - Math.sqrt(5));
        for (let i = 0; i < numParticles; i++) {
            let y = 1 - (i / (numParticles - 1)) * 2;
            let radiusAtY = Math.sqrt(1 - y * y);
            let theta = phi * i;
            particles.push({
                baseX: Math.cos(theta) * radiusAtY,
                baseY: y,
                baseZ: Math.sin(theta) * radiusAtY,
                freq: 0.4 + Math.random() * 0.8,
                phase: Math.random() * Math.PI * 2
            });
        }

        let rotationY = 0, time = 0, rings = [];

        function lerp(s, e, t) { return s * (1 - t) + e * t; }
        function lerpColor(c1, c2, t) {
            return { r: lerp(c1.r, c2.r, t), g: lerp(c1.g, c2.g, t), b: lerp(c1.b, c2.b, t) };
        }

        window.setEdithState = (state) => {
            if (states[state] && state !== targetState) {
                targetState = state;
                transitionProgress = 0;
            }
        };

        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'SET_STATE') {
                window.setEdithState(event.data.state);
            }
        });

        function draw() {
            ctx.clearRect(0, 0, width, height);
            time += 0.05;
            rotationY += currentConfig.rot;

            if (transitionProgress < 1) {
                transitionProgress += 1 / transitionDuration;
                if (transitionProgress > 1) transitionProgress = 1;
                const s = states[edithState], e = states[targetState];
                currentConfig.amp = lerp(s.amp, e.amp, transitionProgress);
                currentConfig.rot = lerp(s.rot, e.rot, transitionProgress);
                currentConfig.drift = lerp(s.drift, e.drift, transitionProgress);
                currentConfig.glow = lerp(s.glow, e.glow, transitionProgress);
                currentConfig.color = lerpColor(s.color, e.color, transitionProgress);
                if (transitionProgress === 1) edithState = targetState;
            }

            // Inner Glow
            if (currentConfig.glow > 0.01) {
                const g = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, baseRadius * 0.8);
                g.addColorStop(0, `rgba(${JARVIS_CYAN.r},${JARVIS_CYAN.g},${JARVIS_CYAN.b},${currentConfig.glow * 0.04})`);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(centerX, centerY, baseRadius * 0.8, 0, Math.PI * 2); ctx.fill();
            }

            // Rings
            if ((targetState === "listening" || targetState === "speaking") && Math.random() < 0.05) {
                rings.push({ r: 40, a: 0.6 });
            }
            rings.forEach((r, i) => {
                r.r += 3; r.a -= 0.02;
                if (r.a <= 0) rings.splice(i, 1);
                else {
                    ctx.strokeStyle = `rgba(${currentConfig.color.r},${currentConfig.color.g},${currentConfig.color.b},${r.a})`;
                    ctx.beginPath(); ctx.arc(centerX, centerY, r.r, 0, Math.PI * 2); ctx.stroke();
                }
            });

            // Project particles
            let projected = particles.map(p => {
                let targetY = p.baseY;
                if (currentConfig.drift > 0) {
                    // Scanning band migration
                    let bandY = p.baseY * 0.3; // ±30 degrees approx
                    let driftVal = Math.sin(time * 0.1) * 0.5 + 0.5; // oscillate between band and original
                    targetY = lerp(p.baseY, bandY, currentConfig.drift * driftVal);
                }

                let radius = baseRadius + Math.sin(p.freq * time + p.phase) * currentConfig.amp;
                let cosY = Math.cos(rotationY), sinY = Math.sin(rotationY);
                let x = (p.baseX * cosY - p.baseZ * sinY) * radius + centerX;
                let z = p.baseX * sinY + p.baseZ * cosY;
                let y = targetY * radius + centerY;
                return { x, y, z };
            });

            // Depth sorting
            projected.sort((a, b) => a.z - b.z);

            // Connection lines
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = `rgba(${JARVIS_CYAN.r},${JARVIS_CYAN.g},${JARVIS_CYAN.b},0.08)`;
            for (let i = 0; i < projected.length; i++) {
                if (projected[i].z < 0) continue;
                let count = 0;
                for (let j = i + 1; j < projected.length && count < 2; j++) {
                    if (projected[j].z < 0) continue;
                    let dx = projected[i].x - projected[j].x, dy = projected[i].y - projected[j].y;
                    if (Math.sqrt(dx*dx + dy*dy) < 60) {
                        ctx.beginPath(); ctx.moveTo(projected[i].x, projected[i].y); ctx.lineTo(projected[j].x, projected[j].y); ctx.stroke();
                        count++;
                    }
                }
            }

            // Draw particles
            projected.forEach(p => {
                let normZ = (p.z + baseRadius) / (2 * baseRadius);
                normZ = Math.max(0, Math.min(1, normZ));
                let size = 1.5 + normZ * 2.5;
                let color = lerpColor(DEEP_BLUE, currentConfig.color, normZ);
                let alpha = 0.3 + normZ * 0.7;
                ctx.fillStyle = `rgba(${Math.floor(color.r)},${Math.floor(color.g)},${Math.floor(color.b)},${alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
