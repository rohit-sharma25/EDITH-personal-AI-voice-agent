<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.D.I.T.H. | J.A.R.V.I.S. Core</title>
    <style>
        :root {
            --bg: #020406;
            --navy: #050a12;
            --cyan: #00d2ff;
            --gold: #ffc850;
            --violet: #b250ff;
            --green: #00ff88;
            --red: #ff3333;
            
            --state-color: var(--gold);
            --spin-speed: 20s;
            --pulse-speed: 4s;
            --reactor-scale: 1;
        }

        body[data-state="idle"] {
            --state-color: var(--gold);
            --spin-speed: 30s;
            --pulse-speed: 4s;
            --reactor-scale: 1;
        }
        body[data-state="listening"] {
            --state-color: var(--cyan);
            --spin-speed: 10s;
            --pulse-speed: 1.5s;
            --reactor-scale: 1.02;
        }
        body[data-state="thinking"] {
            --state-color: var(--violet);
            --spin-speed: 4s;
            --pulse-speed: 0.8s;
            --reactor-scale: 1.05;
        }
        body[data-state="speaking"] {
            --state-color: var(--cyan);
            --spin-speed: 15s;
            --pulse-speed: 0.5s;
            --reactor-scale: 1.02;
        }
        body[data-state="complete"] {
            --state-color: var(--green);
            --spin-speed: 12s;
            --pulse-speed: 2s;
            --reactor-scale: 1;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: #fff; font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
        }

        /* --- BACKGROUND HUD ELEMENTS --- */
        .hud-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: 
                radial-gradient(circle at center, transparent 40%, rgba(0, 210, 255, 0.01) 80%, rgba(0, 210, 255, 0.03) 100%),
                linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        .hud-corner {
            position: absolute; width: 100px; height: 100px;
            border: 1px solid rgba(0, 210, 255, 0.15);
        }
        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        .hud-scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 210, 255, 0.05);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.1);
            animation: scan 8s linear infinite;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .hud-text {
            position: absolute; font-size: 8px; color: rgba(0, 210, 255, 0.2);
            letter-spacing: 0.2em;
        }
        .text-tl { top: 30px; left: 35px; }
        .text-br { bottom: 30px; right: 35px; text-align: right; }

        /* --- LAYOUT --- */
        #app-container {
            width: 100%; height: 100%; display: flex; z-index: 1; position: relative;
        }

        #center-zone {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        #right-sidebar {
            width: 380px; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(5, 10, 18, 0.8) 20%, rgba(0, 10, 20, 0.95) 100%);
            border-left: 1px solid rgba(0, 210, 255, 0.1);
            display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box; z-index: 2;
        }

        /* --- ARC REACTOR --- */
        #arc-reactor {
            width: 500px; height: 500px;
            position: relative;
            transform: scale(var(--reactor-scale));
            transition: transform 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .arc-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
        }
        svg.arc-svg { width: 100%; height: 100%; overflow: visible; }
        
        .ring-base { fill: none; stroke-width: 1; stroke: rgba(255, 255, 255, 0.05); }
        .ring-glow {
            fill: none; stroke: var(--state-color);
            transition: stroke 0.5s ease;
            filter: drop-shadow(0 0 8px var(--state-color));
        }

        .spin-cw { animation: spin var(--spin-speed) linear infinite; }
        .spin-ccw { animation: spin-rev calc(var(--spin-speed) * 1.5) linear infinite; }
        .spin-fast { animation: spin calc(var(--spin-speed) * 0.5) linear infinite; }
        .pulse { animation: breathe var(--pulse-speed) ease-in-out infinite alternate; }
        .core-pulse { animation: core-breathe var(--pulse-speed) ease-in-out infinite alternate; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
        @keyframes breathe { 0% { opacity: 0.4; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1.02); } }
        @keyframes core-breathe { 0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.98); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.02); } }

        /* Inner Core */
        .reactor-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, var(--state-color) 10%, transparent 60%);
            box-shadow: 0 0 40px var(--state-color), inset 0 0 20px var(--state-color);
            transition: all 0.5s ease;
            display: flex; justify-content: center; align-items: center;
        }
        .core-text {
            font-size: 14px; font-weight: bold; letter-spacing: 0.3em;
            color: #fff; text-shadow: 0 0 10px var(--state-color);
            opacity: 0.9;
        }

        /* --- MINI ORB --- */
        #mini-orb-container {
            width: 100%; height: 200px; display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid rgba(0, 210, 255, 0.1); margin-bottom: 15px;
        }
        canvas#orbCanvas { width: 200px; height: 200px; }

        /* --- TRANSCRIPT UI --- */
        .ui-header {
            font-size: 9px; letter-spacing: 0.2em; color: rgba(0, 210, 255, 0.5);
            margin-bottom: 10px; display: flex; justify-content: space-between;
        }
        #transcript-panel {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            background: rgba(0, 5, 10, 0.5); border: 1px solid rgba(0, 210, 255, 0.05);
            border-radius: 4px; padding: 10px;
        }
        #tx-body {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding-right: 5px;
        }
        #tx-body::-webkit-scrollbar { width: 2px; }
        #tx-body::-webkit-scrollbar-track { background: transparent; }
        #tx-body::-webkit-scrollbar-thumb { background: rgba(0, 210, 255, 0.2); }

        .system-msg { font-size: 9px; color: rgba(0, 210, 255, 0.3); text-align: center; margin: 8px 0; }
        .bubble { font-size: 11px; padding: 6px 10px; margin-bottom: 10px; max-width: 85%; line-height: 1.4; border-radius: 4px; }
        .meta-line { font-size: 8px; letter-spacing: 0.1em; margin-bottom: 3px; }
        
        .user-group { align-self: flex-end; align-items: flex-end; display: flex; flex-direction: column; width: 100%; }
        .user-bubble { background: rgba(255, 200, 80, 0.05); border: 1px solid rgba(255, 200, 80, 0.15); color: rgba(255, 200, 80, 0.9); text-shadow: 0 0 5px rgba(255, 200, 80, 0.3); border-top-right-radius: 0; }
        .user-meta { color: rgba(255, 200, 80, 0.4); }

        .edith-group { align-self: flex-start; align-items: flex-start; display: flex; flex-direction: column; width: 100%; }
        .edith-bubble { background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.15); color: rgba(0, 210, 255, 0.9); text-shadow: 0 0 5px rgba(0, 210, 255, 0.3); border-top-left-radius: 0; }
        .edith-meta { color: rgba(0, 210, 255, 0.4); }

        .tx-input-bar { display: flex; margin-top: 10px; border-top: 1px solid rgba(0, 210, 255, 0.1); padding-top: 10px; }
        .tx-input-bar input { flex: 1; background: transparent; border: none; color: #fff; font-family: monospace; font-size: 10px; outline: none; }

        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .btn { background: none; border: 1px solid rgba(0, 210, 255, 0.2); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .btn svg { width: 20px; height: 20px; stroke: var(--state-color); fill: none; stroke-width: 1.5; transition: stroke 0.5s; }
        .btn:hover { border-color: var(--state-color); box-shadow: 0 0 10px rgba(0, 210, 255, 0.1); transform: scale(1.05); }

    </style>
</head>
<body data-state="idle">

    <!-- BACKGROUND HUD -->
    <div class="hud-bg"></div>
    <div class="hud-scanline"></div>
    <div class="hud-corner corner-tl"></div>
    <div class="hud-corner corner-tr"></div>
    <div class="hud-corner corner-bl"></div>
    <div class="hud-corner corner-br"></div>
    <div class="hud-text text-tl">SYS.INIT // CORE ONLINE<br>SATELLITE UPLINK: SECURE</div>
    <div class="hud-text text-br">MEM: 32TB / 64TB<br>NET: 1.2 PB/S</div>

    <div id="app-container">
        
        <!-- CENTER ZONE (ARC REACTOR) -->
        <div id="center-zone">
            <div id="arc-reactor">
                
                <!-- Outer Track -->
                <div class="arc-layer spin-cw">
                    <svg class="arc-svg" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="230" class="ring-base" stroke-dasharray="2 6" />
                        <circle cx="250" cy="250" r="230" class="ring-glow" stroke-width="2" stroke-dasharray="50 150 10 300" />
                    </svg>
                </div>

                <!-- Middle Ring 1 -->
                <div class="arc-layer spin-ccw">
                    <svg class="arc-svg" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="190" class="ring-base" stroke-width="8" stroke-dasharray="1 4" opacity="0.5" />
                        <circle cx="250" cy="250" r="190" class="ring-glow" stroke-width="8" stroke-dasharray="100 200 30 150" opacity="0.8" />
                    </svg>
                </div>

                <!-- Middle Gauge Ring -->
                <div class="arc-layer spin-cw pulse">
                    <svg class="arc-svg" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="160" class="ring-base" stroke-width="2" stroke-dasharray="2 4" opacity="0.4" />
                        <circle cx="250" cy="250" r="160" class="ring-glow" stroke-width="2" stroke-dasharray="2 4" opacity="0.6" />
                    </svg>
                </div>

                <!-- Inner Thick Ring -->
                <div class="arc-layer spin-fast">
                    <svg class="arc-svg" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="130" class="ring-base" stroke-width="15" stroke-dasharray="4 2" opacity="0.3" />
                        <circle cx="250" cy="250" r="130" class="ring-glow" stroke-width="15" stroke-dasharray="60 300 20 400" />
                    </svg>
                </div>

                <!-- Central Glowing Core -->
                <div class="reactor-core core-pulse">
                    <div class="core-text">E.D.I.T.H</div>
                </div>

            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div id="right-sidebar">
            <div class="ui-header">
                <span>ORB VISUALIZER</span>
                <span id="status-text" style="color: var(--state-color); font-weight: bold; text-shadow: 0 0 5px var(--state-color);">STANDBY</span>
            </div>
            
            <div id="mini-orb-container">
                <canvas id="orbCanvas"></canvas>
            </div>

            <div class="ui-header">
                <span>COMMS · TRANSCRIPT</span>
                <span>[● ○ ○]</span>
            </div>

            <div id="transcript-panel">
                <div id="tx-body">
                    <div class="system-msg">— system boot · all modules nominal —</div>
                </div>
                <div class="tx-input-bar">
                    <span style="color: rgba(255,200,80,0.8); font-size: 9px; margin-right: 5px;">YOU &gt;</span>
                    <input type="text" id="tx-input" placeholder="Type a command...">
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="btn-clear" title="Clear Log">
                    <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
                <button class="btn" id="btn-mic" title="Manual Wake" style="width: 55px; height: 55px; border-color: var(--state-color);">
                    <svg viewBox="0 0 24 24" style="width: 24px; height: 24px;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
            </div>
        </div>

    </div>

    <!-- MAIN SCRIPTS -->
    <script>
        /* === 1. STATE MANAGEMENT === */
        const body = document.body;
        const statusText = document.getElementById('status-text');
        
        const stateLabels = {
            idle: "STANDBY", listening: "LISTENING", 
            thinking: "PROCESSING", speaking: "RESPONDING", complete: "COMPLETE"
        };

        // For local simulation
        const testSequence = ['listening', 'thinking', 'speaking', 'complete', 'idle'];
        let seqIndex = 0;

        window.setEdithState = (state) => {
            body.setAttribute('data-state', state);
            currentEdithState = state;
            if (stateLabels[state]) statusText.textContent = stateLabels[state];

            if (state === 'idle') appendSystemMsg("standby mode");
            if (state === 'listening') appendSystemMsg("voice channel open");
            if (state === 'thinking') appendSystemMsg("processing command");
            if (state === 'speaking') appendSystemMsg("transmitting response");
            if (state === 'complete') appendSystemMsg("task complete");
        };

        /* === 2. MINI 3D ORB (Canvas) === */
        const canvas = document.getElementById('orbCanvas');
        const ctx = canvas.getContext('2d');
        const cWidth = 200, cHeight = 200;
        canvas.width = cWidth; canvas.height = cHeight;
        const cx = 100, cy = 100;

        const numParticles = 180;
        const orbRadius = 70;
        let particles = [];
        const phi = Math.PI * (3 - Math.sqrt(5));

        for (let i = 0; i < numParticles; i++) {
            let y = 1 - (i / (numParticles - 1)) * 2;
            let rAtY = Math.sqrt(1 - y * y);
            let theta = phi * i;
            particles.push({
                baseX: Math.cos(theta) * rAtY, baseY: y, baseZ: Math.sin(theta) * rAtY,
                freq: 0.4 + Math.random() * 0.8, phase: Math.random() * Math.PI * 2
            });
        }

        let rotY = 0, time = 0;

        // Extract color from CSS variable for the Orb
        function getComputedStateColor() {
            let color = getComputedStyle(body).getPropertyValue('--state-color').trim();
            // Basic parsing of hex to rgb for canvas usage
            if (color === '#ffc850') return {r: 255, g: 200, b: 80};
            if (color === '#00d2ff') return {r: 0, g: 210, b: 255};
            if (color === '#b250ff') return {r: 178, g: 80, b: 255};
            if (color === '#00ff88') return {r: 0, g: 255, b: 136};
            return {r: 255, g: 200, b: 80}; // Default gold
        }

        function drawOrb() {
            ctx.clearRect(0, 0, cWidth, cHeight);
            time += 0.05;
            
            let state = body.getAttribute('data-state');
            let rotSpeed = state === 'listening' ? 0.02 : state === 'thinking' ? 0.04 : 0.01;
            rotY += rotSpeed;

            let amp = state === 'speaking' ? 12 : state === 'listening' ? 6 : 2;
            let cColor = getComputedStateColor();

            let projected = particles.map(p => {
                let radius = orbRadius + Math.sin(p.freq * time + p.phase) * amp;
                let cosY = Math.cos(rotY), sinY = Math.sin(rotY);
                let x = (p.baseX * cosY - p.baseZ * sinY) * radius + cx;
                let z = p.baseX * sinY + p.baseZ * cosY;
                let y = p.baseY * radius + cy;
                return { x, y, z };
            });

            projected.sort((a, b) => a.z - b.z);

            // Threads
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = `rgba(${cColor.r}, ${cColor.g}, ${cColor.b}, 0.15)`;
            for (let i = 0; i < projected.length; i++) {
                if (projected[i].z < 0) continue;
                let count = 0;
                for (let j = i + 1; j < projected.length && count < 2; j++) {
                    if (projected[j].z < 0) continue;
                    let dx = projected[i].x - projected[j].x, dy = projected[i].y - projected[j].y;
                    if (Math.sqrt(dx*dx + dy*dy) < 35) {
                        ctx.beginPath(); ctx.moveTo(projected[i].x, projected[i].y); ctx.lineTo(projected[j].x, projected[j].y); ctx.stroke();
                        count++;
                    }
                }
            }

            // Dots
            projected.forEach(p => {
                let normZ = (p.z + orbRadius) / (2 * orbRadius);
                normZ = Math.max(0, Math.min(1, normZ));
                let size = 1 + normZ * 1.5;
                let alpha = 0.2 + normZ * 0.8;
                ctx.fillStyle = `rgba(${cColor.r}, ${cColor.g}, ${cColor.b}, ${alpha})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
            });

            requestAnimationFrame(drawOrb);
        }
        drawOrb();

        /* === 3. TRANSCRIPT & UI LOGIC === */
        const txBody = document.getElementById('tx-body');
        const txInput = document.getElementById('tx-input');

        function scrollToBottom() { txBody.scrollTop = txBody.scrollHeight; }
        function getTime() { return new Date().toLocaleTimeString('en-US', { hour12: false }); }

        function appendSystemMsg(text) {
            const div = document.createElement('div');
            div.className = 'system-msg'; div.innerHTML = `— ${text} —`;
            txBody.appendChild(div); scrollToBottom();
        }

        function appendUserMsg(text) {
            const group = document.createElement('div'); group.className = 'user-group';
            group.innerHTML = `<div class="meta-line user-meta">YOU · ${getTime()}</div><div class="bubble user-bubble">${text}</div>`;
            txBody.appendChild(group); scrollToBottom();
        }

        function typeEdithMsg(text, callback) {
            const group = document.createElement('div'); group.className = 'edith-group';
            const meta = document.createElement('div'); meta.className = 'meta-line edith-meta'; meta.innerHTML = `EDITH · ${getTime()}`;
            const bubble = document.createElement('div'); bubble.className = 'bubble edith-bubble';
            const textSpan = document.createElement('span');
            
            bubble.appendChild(textSpan); group.appendChild(meta); group.appendChild(bubble); txBody.appendChild(group);
            
            let i = 0;
            function typeChar() {
                if (i < text.length) {
                    textSpan.textContent += text.charAt(i); i++; scrollToBottom();
                    setTimeout(typeChar, 20);
                } else if (callback) callback();
            }
            typeChar();
        }

        // Demo Sequence Triggered by Input
        txInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && txInput.value.trim() !== '') {
                const text = txInput.value.trim();
                txInput.value = '';

                // --- WEBSOCKET INTEGRATION (Real Usage) ---
                if (window.edithSocket && window.edithSocket.readyState === WebSocket.OPEN) {
                    window.edithSocket.send(JSON.stringify({ action: 'wake', text: text }));
                } else {
                    appendSystemMsg("ERROR: WebSocket disconnected. Cannot send command.");
                }
            }
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            txBody.innerHTML = '<div class="system-msg">— log cleared · session active —</div>';
        });

        let currentEdithState = 'idle';

        document.getElementById('btn-mic').addEventListener('click', () => {
            if (window.edithSocket && window.edithSocket.readyState === WebSocket.OPEN) {
                if (currentEdithState === 'listening' || currentEdithState === 'thinking') {
                    window.edithSocket.send(JSON.stringify({ action: 'sleep' }));
                } else {
                    window.edithSocket.send(JSON.stringify({ action: 'wake' }));
                }
            } else {
                setEdithState('listening');
            }
        });

        /* === 4. REAL WEBSOCKET CONNECTION === */
        function connect() {
            window.edithSocket = new WebSocket('ws://localhost:8765');
            window.edithSocket.onopen = () => { console.log("[WebSocket] Connected."); };
            window.edithSocket.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'state' || data.state) {
                        const stateObj = data.state || data.content;
                        if (typeof stateObj === 'string') setEdithState(stateObj);
                        else if (typeof stateObj === 'object') {
                            setEdithState(stateObj.state);
                            if (stateObj.state === 'speaking' && stateObj.text) typeEdithMsg(stateObj.text);
                        }
                    } else if (data.type === 'user_input') appendUserMsg(data.content);
                } catch (e) { console.error("WS Parse error", e); }
            };
            window.edithSocket.onclose = () => { setTimeout(connect, 3000); };
        }
        connect();

    </script>
</body>
</html>
